name: Security Audit

on:
  schedule:
    # Run security audit daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: |
          echo "Running npm audit..."
          npm audit --json > audit-results.json || true
          npm audit

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(cat audit-results.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-results.json | jq '.metadata.vulnerabilities.high // 0')

          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          elif [ "$HIGH" -gt 0 ]; then
            echo "⚠️ High severity vulnerabilities found (build not failed; please review)"
          else
            echo "✅ No critical or high vulnerabilities found"
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-results
          path: audit-results.json
          retention-days: 30
